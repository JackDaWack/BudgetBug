<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Income</title>
    <script defer src="profiles.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Add Income</h1>
    <form id="addIncomeForm">
        <label for="incomeName">Income Name:</label>
        <input type="text" id="incomeName" name="incomeName" required><br><br>

        <label for="incomeAmount">Amount per Month:</label>
        <input type="number" id="incomeAmount" name="incomeAmount" required><br><br>

        <button type="submit">Add Income</button>
    </form>
</body>
</html>
