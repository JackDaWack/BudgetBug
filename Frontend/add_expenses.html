<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expenses</title>
    <script defer src="profiles.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Add Expenses</h1>
    <form id="addExpensesForm">
        <label for="expenseName">Expense Name:</label>
        <input type="text" id="expenseName" name="expenseName" required><br><br>

        <label for="expenseAmount">Amount per Month:</label>
        <input type="number" id="expenseAmount" name="expenseAmount" required><br><br>

        <button type="submit">Add Expense</button>
    </form>
</body>

</html>
